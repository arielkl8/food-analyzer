<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>&#x1F37D;&#xFE0F; מנתח אוכל חכם</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    #root { max-width: 480px; margin: 0 auto; }
    .app-header { text-align: center; color: white; padding: 24px 0 16px; }

    .app-header p { opacity: 0.85; margin-top: 6px; font-size: 0.95rem; }
    .nav-tabs { display: flex; background: rgba(255,255,255,0.15); border-radius: 16px; padding: 4px; margin-bottom: 20px; gap: 4px; }
    .nav-tab { flex: 1; padding: 10px 8px; border: none; border-radius: 12px; background: transparent; color: rgba(255,255,255,0.75); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .nav-tab.active { background: white; color: #764ba2; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .card { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); margin-bottom: 16px; }
    .api-key-banner { background: #fff8e1; border: 1.5px solid #ffe082; border-radius: 14px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .api-key-banner input:focus { border-color: #764ba2; }
    .btn-save-key { padding: 8px 14px; background: #764ba2; color: white; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    .upload-area { border: 2.5px dashed #c084fc; border-radius: 16px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #faf5ff; position: relative; }
    .upload-area:hover { background: #f3e8ff; border-color: #9333ea; }

    .camera-btn-row { display: flex; gap: 10px; margin-top: 12px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-outline { background: white; border: 2px solid #e5e7eb; color: #374151; }

    .btn-danger { background: #fee2e2; color: #dc2626; border: none; }
    .btn-danger:hover { background: #fecaca; }
    .preview-container { margin-top: 16px; border-radius: 14px; overflow: hidden; position: relative; }
    .preview-container img { width: 100%; max-height: 260px; object-fit: cover; border-radius: 14px; }
    .preview-remove { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
    .loading-state { text-align: center; padding: 32px; }
    .spinner { width: 48px; height: 48px; border: 4px solid #e5e7eb; border-top-color: #764ba2; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { color: #6b7280; font-size: 0.9rem; }
    .loading-steps { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; align-items: center; }
    .loading-step { font-size: 0.82rem; color: #9ca3af; display: flex; align-items: center; gap: 6px; }
    .loading-step.active { color: #764ba2; font-weight: 600; }
    .loading-step.done { color: #16a34a; }
    .result-section { margin-bottom: 20px; }
    .result-section h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af; margin-bottom: 10px; font-weight: 600; }
    .food-name { font-size: 1.4rem; font-weight: 800; color: #1f2937; margin-bottom: 4px; }
    .food-emoji { font-size: 2rem; margin-left: 8px; }
    .calories-badge { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: white; padding: 8px 16px; border-radius: 50px; font-size: 1.1rem; font-weight: 700; margin: 12px 0 6px; }
    .data-source-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.75rem; padding: 3px 10px; border-radius: 50px; font-weight: 600; margin-bottom: 8px; }
    .data-source-usda { background: #dcfce7; color: #16a34a; }
    .data-source-ai { background: #ede9fe; color: #7c3aed; }
    .serving-note { font-size: 0.78rem; color: #9ca3af; margin-bottom: 10px; }
    .macros-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 12px 0; }
    .macro-item { background: #f9fafb; border-radius: 12px; padding: 12px 8px; text-align: center; }
    .macro-item .macro-val { font-size: 1.1rem; font-weight: 700; color: #1f2937; }
    .macro-item .macro-label { font-size: 0.75rem; color: #9ca3af; margin-top: 2px; }
    .ingredients-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .ingredient-tag { background: #ede9fe; color: #7c3aed; padding: 5px 12px; border-radius: 50px; font-size: 0.82rem; font-weight: 500; }
    .health-score { display: flex; align-items: center; gap: 10px; background: #f0fdf4; border-radius: 12px; padding: 12px 16px; }
    .health-score .score-num { font-size: 1.6rem; font-weight: 800; color: #16a34a; }
    .health-bar { flex: 1; height: 8px; background: #dcfce7; border-radius: 4px; overflow: hidden; }
    .health-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #4ade80, #16a34a); transition: width 1s ease; }
    .save-meal-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #11998e, #38ef7d); color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 4px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .save-meal-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .save-meal-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 12px 24px; border-radius: 50px; font-size: 0.9rem; font-weight: 600; z-index: 1000; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .history-empty { text-align: center; padding: 40px 20px; color: #9ca3af; }
    .history-empty .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .history-empty p { font-size: 0.9rem; }
    .history-item { display: flex; align-items: center; gap: 14px; padding: 14px; border-radius: 14px; background: #f9fafb; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; border: 1.5px solid transparent; }
    .history-item:hover { border-color: #c084fc; background: #faf5ff; }
    .history-item img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
    .history-item-info { flex: 1; min-width: 0; }
    .history-item-name { font-weight: 700; color: #1f2937; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-item-date { font-size: 0.78rem; color: #9ca3af; margin-top: 2px; }
    .history-item-cal { font-size: 0.9rem; font-weight: 700; color: #ee5a24; white-space: nowrap; }
    .history-delete-btn { background: none; border: none; color: #d1d5db; cursor: pointer; font-size: 1.1rem; padding: 4px; border-radius: 6px; transition: color 0.15s; }
    .history-delete-btn:hover { color: #ef4444; }
    .daily-summary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 14px; padding: 16px; margin-bottom: 14px; display: flex; justify-content: space-around; text-align: center; }
    .daily-summary .sum-val { font-size: 1.4rem; font-weight: 800; }
    .daily-summary .sum-label { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }
    .error-box { background: #fee2e2; border: 1.5px solid #fecaca; border-radius: 12px; padding: 14px 16px; color: #dc2626; font-size: 0.88rem; margin-top: 12px; line-height: 1.5; }
    .section-title { font-size: 1rem; font-weight: 700; color: #374151; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 20px; }
    .modal { background: white; border-radius: 20px; padding: 24px; max-width: 420px; width: 100%; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .modal-close { background: #f3f4f6; border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f3f4f6; gap: 12px; }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 0.9rem; color: #374151; font-weight: 500; }
    .settings-sublabel { font-size: 0.78rem; color: #9ca3af; margin-top: 2px; }
    .settings-row input { padding: 8px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 0.85rem; width: 180px; outline: none; direction: ltr; flex-shrink: 0; }
    .settings-row input:focus { border-color: #764ba2; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const STORAGE_KEY = 'foodAnalyzerMeals';
const GROQ_KEY_STORAGE = 'groqApiKey';
const USDA_KEY_STORAGE = 'usdaApiKey';
const PROFILE_STORAGE = 'foodAnalyzerProfile';
const USDA_DEMO_KEY = 'DEMO_KEY';

function loadMeals() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}
function saveMeals(meals) { localStorage.setItem(STORAGE_KEY, JSON.stringify(meals)); }
function loadGroqKey() { return localStorage.getItem(GROQ_KEY_STORAGE) || ''; }
function saveGroqKey(k) { localStorage.setItem(GROQ_KEY_STORAGE, k); }
function loadUsdaKey() { return localStorage.getItem(USDA_KEY_STORAGE) || ''; }
function saveUsdaKey(k) { localStorage.setItem(USDA_KEY_STORAGE, k); }
function loadProfile() {
  try { return JSON.parse(localStorage.getItem(PROFILE_STORAGE) || 'null'); }
  catch { return null; }
}
function saveProfile(p) { localStorage.setItem(PROFILE_STORAGE, JSON.stringify(p)); }

function formatDate(ts) {
  return new Date(ts).toLocaleDateString('he-IL', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}
function todayMeals(meals) {
  const today = new Date(); today.setHours(0,0,0,0);
  return meals.filter(m => new Date(m.timestamp) >= today);
}

function calcBMR(profile) {
  if (!profile || !profile.weight || !profile.height || !profile.age) return null;
  const { weight, height, age, gender } = profile;
  if (gender === 'male') return Math.round(10 * weight + 6.25 * height - 5 * age + 5);
  return Math.round(10 * weight + 6.25 * height - 5 * age - 161);
}
const ACTIVITY_MULT = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725 };
function calcTDEE(profile) {
  const bmr = calcBMR(profile);
  if (!bmr) return null;
  return Math.round(bmr * (ACTIVITY_MULT[profile.activity || 'sedentary']));
}
function calcBMI(profile) {
  if (!profile || !profile.weight || !profile.height) return null;
  return Math.round(profile.weight / Math.pow(profile.height / 100, 2) * 10) / 10;
}
function getBMILabel(bmi) {
  if (!bmi) return '';
  if (bmi < 18.5) return 'תת משקל';
  if (bmi < 25) return 'משקל תקין';
  if (bmi < 30) return 'עודף משקל';
  return 'השמנה';
}
function getBMIColor(bmi) {
  if (!bmi) return '#9ca3af';
  if (bmi < 18.5) return '#3b82f6';
  if (bmi < 25) return '#16a34a';
  if (bmi < 30) return '#f59e0b';
  return '#dc2626';
}
async function identifyWithGroq(base64Image, mimeType, groqKey) {
  const prompt = 'You are an expert nutritionist and food recognition AI. Analyze this food image and respond with ONLY a JSON object (no markdown, no explanation): { "nameHe": "food name in Hebrew", "nameEn": "food name in English (simple, for USDA database search)", "emoji": "one relevant food emoji", "estimatedGrams": 300, "ingredients": ["ingredient1 in Hebrew"], "healthScore": 7, "description": "1-2 sentence description in Hebrew", "fallbackCalories": 450, "fallbackProtein": 20, "fallbackCarbs": 55, "fallbackFat": 15 }. estimatedGrams: best estimate of serving weight in grams.';
  var imageUrl = 'data:' + mimeType + ';base64,' + base64Image;
  var resp;
  try {
    resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + groqKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'meta-llama/llama-4-scout-17b-16e-instruct',
        messages: [{ role: 'user', content: [
          { type: 'image_url', image_url: { url: imageUrl } },
          { type: 'text', text: prompt }
        ]}],
        max_tokens: 600, temperature: 0.2
      })
    });
  } catch(e) { throw new Error('שגיאת רשת: ' + e.message); }
  if (!resp.ok) {
    const eb = await resp.json().catch(() => ({}));
    const msg = eb?.error?.message || ('HTTP ' + resp.status);
    throw new Error(msg);
  }
  const data = await resp.json();
  const raw = data.choices?.[0]?.message?.content || '';
  const start = raw.indexOf('{'); const end = raw.lastIndexOf('}');
  if (start === -1 || end === -1) throw new Error('תגובה לא תקינה מ-Groq');
  return JSON.parse(raw.slice(start, end + 1));
}

async function queryUSDA(query, usdaKey) {
  const key = usdaKey || USDA_DEMO_KEY;
  const url = 'https://api.nal.usda.gov/fdc/v1/foods/search?query=' + encodeURIComponent(query) + '&api_key=' + key + '&pageSize=3&dataType=SR%20Legacy,Foundation';
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('USDA error ' + resp.status);
  const data = await resp.json();
  const food = data.foods?.[0];
  if (!food) return null;
  const nutrients = food.foodNutrients || [];
  function getNutrient(...ids) {
    for (const id of ids) {
      const n = nutrients.find(n => n.nutrientId === id || n.nutrientNumber === String(id));
      if (n && n.value != null) return Math.round(n.value);
    }
    return null;
  }
  const calories = getNutrient(1008, 2047);
  if (calories == null) return null;
  return { per100g: { calories, protein: getNutrient(1003)||0, carbs: getNutrient(1005)||0, fat: getNutrient(1004)||0 }, foodName: food.description };
}

async function analyzeFood(base64Image, mimeType, groqKey, usdaKey, onStep) {
  onStep('groq');
  const groq = await identifyWithGroq(base64Image, mimeType, groqKey);
  let nutrition = null, dataSource = 'ai', usdaFoodName = null;
  onStep('usda');
  try {
    const usda = await queryUSDA(groq.nameEn, usdaKey);
    if (usda) {
      const factor = (groq.estimatedGrams || 100) / 100;
      nutrition = { calories: Math.round(usda.per100g.calories*factor), protein: Math.round(usda.per100g.protein*factor), carbs: Math.round(usda.per100g.carbs*factor), fat: Math.round(usda.per100g.fat*factor) };
      dataSource = 'usda'; usdaFoodName = usda.foodName;
    }
  } catch (_) {}
  if (!nutrition) nutrition = { calories: groq.fallbackCalories, protein: groq.fallbackProtein, carbs: groq.fallbackCarbs, fat: groq.fallbackFat };
  return { name: groq.nameHe, nameEn: groq.nameEn, emoji: groq.emoji, estimatedGrams: groq.estimatedGrams, ingredients: groq.ingredients, healthScore: groq.healthScore, description: groq.description, dataSource, usdaFoodName, ...nutrition };
}

function ApiKeyBanner({ groqKey, onSave }) {
  const [val, setVal] = useState('');
  if (groqKey) return null;
  return (
    <div className="api-key-banner">
      <span>&#x1F511;</span>
      <p>נדרש מפתח Groq API (חינמי)</p>
      <input type="password" placeholder="gsk_..." value={val} onChange={e => setVal(e.target.value)} onKeyDown={e => e.key === 'Enter' && val && onSave(val)} />
      <button className="btn-save-key" onClick={() => val && onSave(val)}>שמור</button>
    </div>
  );
}
function Toast({ message, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
  return <div className="toast">{message}</div>;
}
function LoadingView({ step }) {
  const steps = [
    { id: 'groq', label: 'Groq AI מזהה את האוכל...', icon: '🤖' },
    { id: 'usda', label: 'USDA מחפש נתוני תזונה...', icon: '🌾' },
  ];
  return (
    <div className="loading-state">
      <div className="spinner" />
      <p>מנתח את האוכל שלך...</p>
      <div className="loading-steps">
        {steps.map(s => {
          const stepIdx = steps.findIndex(x => x.id === step);
          const thisIdx = steps.findIndex(x => x.id === s.id);
          const isDone = thisIdx < stepIdx; const isActive = s.id === step;
          return (
            <div key={s.id} className={'loading-step' + (isDone ? ' done' : isActive ? ' active' : '')}>
              {isDone ? '✅' : isActive ? '⏳' : '○'} {s.icon} {s.label}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ResultView({ result, onSave, saved }) {
  const barWidth = Math.min((result.healthScore / 10) * 100, 100);
  const isUSDA = result.dataSource === 'usda';
  return (
    <div>
      <div className="result-section">
        <div style={{display:'flex', alignItems:'center'}}>
          <span className="food-emoji">{result.emoji}</span>
          <div>
            <div className="food-name">{result.name}</div>
            {result.description && <div style={{color:'#6b7280', fontSize:'0.85rem', marginTop:2}}>{result.description}</div>}
          </div>
        </div>
        <div className="calories-badge">&#x1F525; {result.calories} קלוריות</div>
        <div>
          <span className={'data-source-badge ' + (isUSDA ? 'data-source-usda' : 'data-source-ai')}>
            {isUSDA ? '✅ USDA FoodData Central' : '🤖 הערכת Groq AI'}
          </span>
        </div>
        {isUSDA && result.estimatedGrams && (
          <div className="serving-note">מבוסס על ~{result.estimatedGrams}g {result.usdaFoodName && '· ' + result.usdaFoodName}</div>
        )}
      </div>
      <div className="result-section">
        <h3>מקרונוטריאנטים</h3>
        <div className="macros-grid">
          <div className="macro-item"><div className="macro-val">{result.protein}g</div><div className="macro-label">&#x1F4AA; חלבון</div></div>
          <div className="macro-item"><div className="macro-val">{result.carbs}g</div><div className="macro-label">&#x1F33E; פחמימות</div></div>
          <div className="macro-item"><div className="macro-val">{result.fat}g</div><div className="macro-label">&#x1F951; שומן</div></div>
        </div>
      </div>
      <div className="result-section">
        <h3>מרכיבים</h3>
        <div className="ingredients-list">
          {result.ingredients.map((ing, i) => (<span key={i} className="ingredient-tag">{ing}</span>))}
        </div>
      </div>
      <div className="result-section">
        <h3>ציון בריאות</h3>
        <div className="health-score">
          <div className="score-num">{result.healthScore}/10</div>
          <div className="health-bar"><div className="health-bar-fill" style={{width: barWidth + '%'}} /></div>
        </div>
      </div>
      <button className="save-meal-btn" onClick={onSave} disabled={saved}>
        {saved ? '✅ נשמר בהיסטוריה!' : '💾 שמור ארוחה'}
      </button>
    </div>
  );
}

function HistoryModal({ meal, onClose }) {
  if (!meal) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div style={{fontSize:'1.3rem', fontWeight:800}}>{meal.emoji} {meal.name}</div>
            <div style={{fontSize:'0.8rem', color:'#9ca3af', marginTop:4}}>{formatDate(meal.timestamp)}</div>
          </div>
          <button className="modal-close" onClick={onClose}>&#x2715;</button>
        </div>
        {meal.imageData && <img src={meal.imageData} style={{width:'100%', borderRadius:12, marginBottom:14, maxHeight:200, objectFit:'cover'}} />}
        <ResultView result={meal} onSave={() => {}} saved={true} />
      </div>
    </div>
  );
}

function HistoryTab({ meals, onDelete }) {

    reader.readAsDataURL(file);
  }, []);

  const handleDrop = (e) => { e.preventDefault(); const file = e.dataTransfer.files[0]; if (file) handleFile(file); };

  const analyze = async () => {
    if (!imageBase64 || !groqKey) return;
    setLoading(true); setError(null); setResult(null); setLoadStep('groq');
    try {
      const res = await analyzeFood(imageBase64, imageMime, groqKey, usdaKey, setLoadStep);
      setResult(res);
    } catch(e) {
      setError(e.message || 'שגיאה לא ידועה');
    } finally { setLoading(false); }
  };

  const saveMeal = () => {
    if (!result || saved) return;
    const meal = { ...result, id: Date.now().toString(), timestamp: Date.now(), imageData: imagePreview };
    const updated = [...meals, meal];
    setMeals(updated); saveMeals(updated); setSaved(true);
    setToast('✅ הארוחה נשמרה בהיסטוריה!');
  };

  const deleteMeal = (id) => {
    const updated = meals.filter(m => m.id !== id);
    setMeals(updated); saveMeals(updated);
    setToast('🗑️ הארוחה נמחקה');
  };

  const clearImage = () => {
    setImagePreview(null); setImageBase64(null); setImageMime(null);
    setResult(null); setError(null); setSaved(false);
  };

  const saveGroqHandler    = (key) => { saveGroqKey(key); setGroqKey(key); setToast('🔑 מפתח Groq נשמר!'); };
  const saveUsdaHandler    = (key) => { saveUsdaKey(key); setUsdaKey(key); setToast('🌾 מפתח USDA נשמר!'); };
  const saveProfileHandler = (p)   => { saveProfile(p); setProfile(p); setToast('👤 פרופיל נשמר!'); };

  const tabs = [
    { id:'analyze',  label:'📷 ניתוח' },
    { id:'history',  label:'📋 היסטוריה (' + meals.length + ')' },
    { id:'report',   label:'📊 דוח' },
    { id:'settings', label:'⚙️ הגדרות' },
  ];

  return (
    <div>
      <div className="app-header">
        <h1>&#x1F37D;&#xFE0F; מנתח אוכל חכם</h1>
        <p>צלם אוכל וקבל ניתוח תזונתי מיידי</p>
      </div>

      <ApiKeyBanner groqKey={groqKey} onSave={saveGroqHandler} />

      <nav className="nav-tabs">
        {tabs.map(t => (
          <button key={t.id} className={'nav-tab ' + (tab===t.id ? 'active' : '')} onClick={() => setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </nav>

      {tab === 'analyze' && (
        <div className="card">
          {!imagePreview ? (
            <>
              <div className="upload-area" onDrop={handleDrop} onDragOver={e => e.preventDefault()}>
                <div className="upload-icon">&#x1F4F8;</div>
                <h3>גרור תמונה לכאן</h3>
                <p>או לחץ לבחירת קובץ</p>
                <input ref={fileRef} type="file" accept="image/*" onChange={e => handleFile(e.target.files[0])} />
              </div>
              <div className="camera-btn-row">
                <button className="btn btn-outline" onClick={() => cameraRef.current.click()}>&#x1F4F7; צלם עכשיו</button>
              </div>
              <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e => handleFile(e.target.files[0])} />
            </>
          ) : (
            <>
              <div className="preview-container">
                <img src={imagePreview} alt="תצוגה מקדימה" />
                <button className="preview-remove" onClick={clearImage}>&#x2715;</button>
              </div>
              {!result && !loading && (
                <button className="btn btn-primary" style={{width:'100%', marginTop:14}} onClick={analyze} disabled={!groqKey}>
                  {groqKey ? '🔍 נתח אוכל' : '🔑 נדרש מפתח Groq API'}
                </button>
              )}
            </>
          )}
          {loading && <LoadingView step={loadStep} />}
          {error && <div className="error-box">&#x26A0;&#xFE0F; {error}</div>}
          {result && !loading && <ResultView result={result} onSave={saveMeal} saved={saved} />}
        </div>
      )}

      {tab === 'history'  && <HistoryTab meals={meals} onDelete={deleteMeal} />}
      {tab === 'report'   && <ReportTab  meals={meals} profile={profile} />}

      {tab === 'settings' && (
        <SettingsTab
          groqKey={groqKey} usdaKey={usdaKey} profile={profile}
          onSaveGroq={saveGroqHandler} onSaveUsda={saveUsdaHandler}
          onSaveProfile={saveProfileHandler}
          onClearHistory={() => { setMeals([]); saveMeals([]); setToast('🗑️ ההיסטוריה נמחקה'); }}
        />
      )}

      {toast && <Toast message={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
