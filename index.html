<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍽️ מנתח אוכל חכם</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    #root { max-width: 480px; margin: 0 auto; }

    .app-header {
      text-align: center;
      color: white;
      padding: 24px 0 16px;
    }
    .app-header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
    .app-header p { opacity: 0.85; margin-top: 6px; font-size: 0.95rem; }

    .nav-tabs {
      display: flex;
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 4px;
      margin-bottom: 20px;
      gap: 4px;
    }
    .nav-tab {
      flex: 1;
      padding: 10px 8px;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: rgba(255,255,255,0.75);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .nav-tab.active {
      background: white;
      color: #764ba2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      margin-bottom: 16px;
    }

    /* API Key Section */
    .api-key-banner {
      background: #fff8e1;
      border: 1.5px solid #ffe082;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .api-key-banner span { font-size: 1.3rem; }
    .api-key-banner p { font-size: 0.85rem; color: #795548; flex: 1; min-width: 160px; }
    .api-key-banner input {
      flex: 2;
      min-width: 160px;
      padding: 8px 12px;
      border: 1.5px solid #ffe082;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
    }
    .api-key-banner input:focus { border-color: #764ba2; }
    .btn-save-key {
      padding: 8px 14px;
      background: #764ba2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* Upload area */
    .upload-area {
      border: 2.5px dashed #c084fc;
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #faf5ff;
      position: relative;
    }
    .upload-area:hover { background: #f3e8ff; border-color: #9333ea; }
    .upload-area .upload-icon { font-size: 3rem; margin-bottom: 12px; }
    .upload-area h3 { color: #7c3aed; font-size: 1rem; margin-bottom: 6px; }
    .upload-area p { color: #9ca3af; font-size: 0.85rem; }
    .upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }

    /* Camera row */
    .camera-btn-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-outline {
      background: white;
      border: 2px solid #e5e7eb;
      color: #374151;
    }
    .btn-outline:hover { border-color: #764ba2; color: #764ba2; }
    .btn-danger {
      background: #fee2e2;
      color: #dc2626;
      border: none;
    }
    .btn-danger:hover { background: #fecaca; }

    /* Preview image */
    .preview-container {
      margin-top: 16px;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
    }
    .preview-container img {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 14px;
    }
    .preview-remove {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 32px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e5e7eb;
      border-top-color: #764ba2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { color: #6b7280; font-size: 0.9rem; }

    /* Results */
    .result-section { margin-bottom: 20px; }
    .result-section h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .food-name {
      font-size: 1.4rem;
      font-weight: 800;
      color: #1f2937;
      margin-bottom: 4px;
    }
    .food-emoji { font-size: 2rem; margin-left: 8px; }

    .calories-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      color: white;
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      margin: 12px 0;
    }

    .macros-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 12px 0;
    }
    .macro-item {
      background: #f9fafb;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }
    .macro-item .macro-val {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1f2937;
    }
    .macro-item .macro-label {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 2px;
    }

    .ingredients-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .ingredient-tag {
      background: #ede9fe;
      color: #7c3aed;
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .health-score {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f0fdf4;
      border-radius: 12px;
      padding: 12px 16px;
    }
    .health-score .score-num {
      font-size: 1.6rem;
      font-weight: 800;
      color: #16a34a;
    }
    .health-bar {
      flex: 1;
      height: 8px;
      background: #dcfce7;
      border-radius: 4px;
      overflow: hidden;
    }
    .health-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #4ade80, #16a34a);
      transition: width 1s ease;
    }

    /* Save button */
    .save-meal-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .save-meal-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .save-meal-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Saved toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* History */
    .history-empty {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
    }
    .history-empty .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .history-empty p { font-size: 0.9rem; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: 14px;
      background: #f9fafb;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1.5px solid transparent;
    }
    .history-item:hover { border-color: #c084fc; background: #faf5ff; }
    .history-item img {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .history-item-info { flex: 1; min-width: 0; }
    .history-item-name {
      font-weight: 700;
      color: #1f2937;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item-date { font-size: 0.78rem; color: #9ca3af; margin-top: 2px; }
    .history-item-cal {
      font-size: 0.9rem;
      font-weight: 700;
      color: #ee5a24;
      white-space: nowrap;
    }
    .history-delete-btn {
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s;
    }
    .history-delete-btn:hover { color: #ef4444; }

    .daily-summary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-around;
      text-align: center;
    }
    .daily-summary .sum-val { font-size: 1.4rem; font-weight: 800; }
    .daily-summary .sum-label { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }

    .error-box {
      background: #fee2e2;
      border: 1.5px solid #fecaca;
      border-radius: 12px;
      padding: 14px 16px;
      color: #dc2626;
      font-size: 0.88rem;
      margin-top: 12px;
      line-height: 1.5;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      padding: 20px;
    }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 24px;
      max-width: 420px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .modal-close {
      background: #f3f4f6;
      border: none;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 0.9rem; color: #374151; font-weight: 500; }
    .settings-sublabel { font-size: 0.78rem; color: #9ca3af; margin-top: 2px; }
    .settings-row input {
      padding: 8px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.85rem;
      width: 180px;
      outline: none;
      direction: ltr;
    }
    .settings-row input:focus { border-color: #764ba2; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── helpers ─── */
const STORAGE_KEY = 'foodAnalyzerMeals';
const API_KEY_STORAGE = 'claudeApiKey';

function loadMeals() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}
function saveMeals(meals) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(meals));
}
function loadApiKey() {
  return localStorage.getItem(API_KEY_STORAGE) || '';
}
function saveApiKey(key) {
  localStorage.setItem(API_KEY_STORAGE, key);
}
function formatDate(ts) {
  return new Date(ts).toLocaleDateString('he-IL', {
    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
  });
}
function todayMeals(meals) {
  const today = new Date(); today.setHours(0,0,0,0);
  return meals.filter(m => new Date(m.timestamp) >= today);
}

/* ─── Claude API call ─── */
async function analyzeFood(base64Image, mimeType, apiKey) {
  const prompt = `אתה תזונאי מומחה. נתח את תמונת האוכל וספק:
1. שם המאכל בעברית
2. קלוריות משוערות (מספר בלבד)
3. מרכיבים עיקריים (עד 8 מרכיבים)
4. מקרונוטריאנטים: חלבון, פחמימות, שומן (בגרמים)
5. ציון בריאות מ-1 עד 10

החזר JSON בלבד (ללא markdown, ללא הסברים):
{
  "name": "שם המאכל",
  "emoji": "אמוג'י מתאים",
  "calories": 450,
  "ingredients": ["מרכיב1", "מרכיב2", "..."],
  "protein": 25,
  "carbs": 60,
  "fat": 15,
  "healthScore": 7,
  "description": "תיאור קצר של 1-2 משפטים"
}`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 600,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64Image } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `שגיאת API: ${response.status}`);
  }

  const data = await response.json();
  const text = data.content[0].text.trim();
  const clean = text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
  return JSON.parse(clean);
}

/* ─── Components ─── */
function ApiKeyBanner({ apiKey, onSave }) {
  const [val, setVal] = useState(apiKey);
  if (apiKey) return null;
  return (
    <div className="api-key-banner">
      <span>🔑</span>
      <p>נדרש מפתח API של Claude</p>
      <input
        type="password"
        placeholder="sk-ant-..."
        value={val}
        onChange={e => setVal(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && val && onSave(val)}
      />
      <button className="btn-save-key" onClick={() => val && onSave(val)}>שמור</button>
    </div>
  );
}

function Toast({ message, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
  return <div className="toast">{message}</div>;
}

function ResultView({ result, onSave, saved }) {
  const barWidth = Math.min((result.healthScore / 10) * 100, 100);
  return (
    <div>
      <div className="result-section">
        <div style={{display:'flex', alignItems:'center'}}>
          <span className="food-emoji">{result.emoji}</span>
          <div>
            <div className="food-name">{result.name}</div>
            {result.description && <div style={{color:'#6b7280', fontSize:'0.85rem', marginTop:2}}>{result.description}</div>}
          </div>
        </div>
        <div className="calories-badge">🔥 {result.calories} קלוריות</div>
      </div>

      <div className="result-section">
        <h3>מקרונוטריאנטים</h3>
        <div className="macros-grid">
          <div className="macro-item">
            <div className="macro-val">{result.protein}g</div>
            <div className="macro-label">💪 חלבון</div>
          </div>
          <div className="macro-item">
            <div className="macro-val">{result.carbs}g</div>
            <div className="macro-label">🌾 פחמימות</div>
          </div>
          <div className="macro-item">
            <div className="macro-val">{result.fat}g</div>
            <div className="macro-label">🥑 שומן</div>
          </div>
        </div>
      </div>

      <div className="result-section">
        <h3>מרכיבים</h3>
        <div className="ingredients-list">
          {result.ingredients.map((ing, i) => (
            <span key={i} className="ingredient-tag">{ing}</span>
          ))}
        </div>
      </div>

      <div className="result-section">
        <h3>ציון בריאות</h3>
        <div className="health-score">
          <div className="score-num">{result.healthScore}/10</div>
          <div className="health-bar">
            <div className="health-bar-fill" style={{width: barWidth + '%'}} />
          </div>
        </div>
      </div>

      <button
        className="save-meal-btn"
        onClick={onSave}
        disabled={saved}
      >
        {saved ? '✅ נשמר בהיסטוריה!' : '💾 שמור ארוחה'}
      </button>
    </div>
  );
}

function HistoryModal({ meal, onClose }) {
  if (!meal) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div style={{fontSize:'1.3rem', fontWeight:800}}>{meal.emoji} {meal.name}</div>
            <div style={{fontSize:'0.8rem', color:'#9ca3af', marginTop:4}}>{formatDate(meal.timestamp)}</div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {meal.imageData && <img src={meal.imageData} style={{width:'100%', borderRadius:12, marginBottom:14, maxHeight:200, objectFit:'cover'}} />}
        <ResultView result={meal} onSave={() => {}} saved={true} />
      </div>
    </div>
  );
}

function HistoryTab({ meals, onDelete }) {
  const [selected, setSelected] = useState(null);
  const todayList = todayMeals(meals);
  const totalCals = todayList.reduce((s,m) => s + m.calories, 0);
  const totalProtein = todayList.reduce((s,m) => s + (m.protein||0), 0);
  const totalCarbs = todayList.reduce((s,m) => s + (m.carbs||0), 0);

  if (meals.length === 0) {
    return (
      <div className="card">
        <div className="history-empty">
          <div className="empty-icon">🍽️</div>
          <p>עדיין לא נשמרו ארוחות<br/>צלם אוכל כדי להתחיל!</p>
        </div>
      </div>
    );
  }

  return (
    <div>
      {todayList.length > 0 && (
        <div className="daily-summary">
          <div><div className="sum-val">🔥 {totalCals}</div><div className="sum-label">קלוריות היום</div></div>
          <div><div className="sum-val">💪 {totalProtein}g</div><div className="sum-label">חלבון</div></div>
          <div><div className="sum-val">🌾 {totalCarbs}g</div><div className="sum-label">פחמימות</div></div>
        </div>
      )}
      <div className="card">
        <div className="section-title">📋 כל הארוחות ({meals.length})</div>
        {meals.slice().reverse().map(meal => (
          <div key={meal.id} className="history-item" onClick={() => setSelected(meal)}>
            {meal.imageData
              ? <img src={meal.imageData} alt={meal.name} />
              : <div style={{width:60, height:60, borderRadius:10, background:'#f3e8ff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'1.8rem', flexShrink:0}}>{meal.emoji}</div>
            }
            <div className="history-item-info">
              <div className="history-item-name">{meal.name}</div>
              <div className="history-item-date">{formatDate(meal.timestamp)}</div>
            </div>
            <div className="history-item-cal">🔥 {meal.calories}</div>
            <button className="history-delete-btn" onClick={e => { e.stopPropagation(); onDelete(meal.id); }}>🗑️</button>
          </div>
        ))}
      </div>
      {selected && <HistoryModal meal={selected} onClose={() => setSelected(null)} />}
    </div>
  );
}

function SettingsTab({ apiKey, onSaveKey, onClearHistory }) {
  const [keyVal, setKeyVal] = useState(apiKey);
  const [showKey, setShowKey] = useState(false);
  return (
    <div className="card">
      <div className="section-title">⚙️ הגדרות</div>

      <div className="settings-row">
        <div>
          <div className="settings-label">מפתח Claude API</div>
          <div className="settings-sublabel">נדרש לניתוח תמונות</div>
        </div>
        <input
          type={showKey ? 'text' : 'password'}
          placeholder="sk-ant-..."
          value={keyVal}
          onChange={e => setKeyVal(e.target.value)}
          style={{direction:'ltr'}}
        />
      </div>
      <div style={{display:'flex', gap:8, marginTop:8}}>
        <button className="btn btn-outline" onClick={() => setShowKey(s => !s)} style={{flex:0, padding:'8px 14px', fontSize:'0.82rem'}}>
          {showKey ? '🙈 הסתר' : '👁️ הצג'}
        </button>
        <button className="btn btn-primary" onClick={() => keyVal && onSaveKey(keyVal)} style={{fontSize:'0.85rem'}}>
          💾 שמור מפתח
        </button>
      </div>

      <div className="settings-row" style={{marginTop:16}}>
        <div>
          <div className="settings-label">מחק היסטוריה</div>
          <div className="settings-sublabel">מחיקת כל הארוחות השמורות</div>
        </div>
        <button className="btn btn-danger" style={{padding:'8px 14px', fontSize:'0.82rem'}} onClick={onClearHistory}>🗑️ מחק הכל</button>
      </div>

      <div style={{marginTop:20, background:'#f9fafb', borderRadius:12, padding:'12px 14px'}}>
        <div style={{fontSize:'0.82rem', color:'#6b7280', lineHeight:1.7}}>
          <b>📌 הוראות הגדרה:</b><br/>
          1. היכנס ל-<a href="https://console.anthropic.com" target="_blank" style={{color:'#764ba2'}}>console.anthropic.com</a><br/>
          2. צור מפתח API חדש<br/>
          3. הדבק אותו כאן ולחץ "שמור מפתח"<br/>
          4. המפתח נשמר רק בדפדפן שלך
        </div>
      </div>
    </div>
  );
}

/* ─── Main App ─── */
function App() {
  const [tab, setTab] = useState('analyze');
  const [apiKey, setApiKey] = useState(loadApiKey);
  const [meals, setMeals] = useState(loadMeals);
  const [imageFile, setImageFile] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [imageBase64, setImageBase64] = useState(null);
  const [imageMime, setImageMime] = useState(null);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [saved, setSaved] = useState(false);
  const [toast, setToast] = useState(null);
  const fileRef = useRef();
  const cameraRef = useRef();

  const handleFile = useCallback((file) => {
    if (!file || !file.type.startsWith('image/')) return;
    setResult(null); setError(null); setSaved(false);
    setImageFile(file);
    setImageMime(file.type);
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      setImagePreview(dataUrl);
      const base64 = dataUrl.split(',')[1];
      setImageBase64(base64);
    };
    reader.readAsDataURL(file);
  }, []);

  const handleDrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  };

  const analyze = async () => {
    if (!imageBase64 || !apiKey) return;
    setLoading(true); setError(null); setResult(null);
    try {
      const res = await analyzeFood(imageBase64, imageMime, apiKey);
      setResult(res);
    } catch(e) {
      setError(e.message || 'שגיאה לא ידועה');
    } finally {
      setLoading(false);
    }
  };

  const saveMeal = () => {
    if (!result || saved) return;
    const meal = {
      ...result,
      id: Date.now().toString(),
      timestamp: Date.now(),
      imageData: imagePreview
    };
    const updated = [...meals, meal];
    setMeals(updated);
    saveMeals(updated);
    setSaved(true);
    setToast('✅ הארוחה נשמרה בהיסטוריה!');
  };

  const deleteMeal = (id) => {
    const updated = meals.filter(m => m.id !== id);
    setMeals(updated);
    saveMeals(updated);
    setToast('🗑️ הארוחה נמחקה');
  };

  const clearImage = () => {
    setImageFile(null); setImagePreview(null);
    setImageBase64(null); setImageMime(null);
    setResult(null); setError(null); setSaved(false);
  };

  const saveApiKeyHandler = (key) => {
    saveApiKey(key);
    setApiKey(key);
    setToast('🔑 מפתח ה-API נשמר!');
  };

  return (
    <div>
      <div className="app-header">
        <h1>🍽️ מנתח אוכל חכם</h1>
        <p>צלם אוכל וקבל ניתוח תזונתי מיידי</p>
      </div>

      <ApiKeyBanner apiKey={apiKey} onSave={saveApiKeyHandler} />

      <nav className="nav-tabs">
        {[
          { id:'analyze', label:'📷 ניתוח', },
          { id:'history', label:`📋 היסטוריה (${meals.length})` },
          { id:'settings', label:'⚙️ הגדרות' }
        ].map(t => (
          <button key={t.id} className={`nav-tab ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </nav>

      {tab === 'analyze' && (
        <div className="card">
          {!imagePreview ? (
            <>
              <div
                className="upload-area"
                onDrop={handleDrop}
                onDragOver={e => e.preventDefault()}
              >
                <div className="upload-icon">📸</div>
                <h3>גרור תמונה לכאן</h3>
                <p>או לחץ לבחירת קובץ</p>
                <input
                  ref={fileRef}
                  type="file"
                  accept="image/*"
                  onChange={e => handleFile(e.target.files[0])}
                />
              </div>
              <div className="camera-btn-row">
                <button className="btn btn-outline" onClick={() => cameraRef.current.click()}>
                  📷 צלם עכשיו
                </button>
              </div>
              <input
                ref={cameraRef}
                type="file"
                accept="image/*"
                capture="environment"
                style={{display:'none'}}
                onChange={e => handleFile(e.target.files[0])}
              />
            </>
          ) : (
            <>
              <div className="preview-container">
                <img src={imagePreview} alt="תצוגה מקדימה" />
                <button className="preview-remove" onClick={clearImage}>✕</button>
              </div>
              {!result && !loading && (
                <button
                  className="btn btn-primary"
                  style={{width:'100%', marginTop:14}}
                  onClick={analyze}
                  disabled={!apiKey}
                >
                  {apiKey ? '🔍 נתח אוכל' : '🔑 נדרש מפתח API'}
                </button>
              )}
            </>
          )}

          {loading && (
            <div className="loading-state">
              <div className="spinner" />
              <p>מנתח את האוכל שלך...</p>
              <p style={{marginTop:4, fontSize:'0.8rem', color:'#c4b5fd'}}>Claude בוחן את התמונה 🤖</p>
            </div>
          )}

          {error && <div className="error-box">⚠️ {error}</div>}

          {result && !loading && (
            <ResultView result={result} onSave={saveMeal} saved={saved} />
          )}
        </div>
      )}

      {tab === 'history' && (
        <HistoryTab meals={meals} onDelete={deleteMeal} />
      )}

      {tab === 'settings' && (
        <SettingsTab
          apiKey={apiKey}
          onSaveKey={saveApiKeyHandler}
          onClearHistory={() => { setMeals([]); saveMeals([]); setToast('🗑️ ההיסטוריה נמחקה'); }}
        />
      )}

      {toast && <Toast message={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
